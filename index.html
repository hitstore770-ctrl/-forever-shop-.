<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ממתק לשבת | קטלוג מתוקים ופיצוחים</title>

    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts: Heebo & Assistant -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700;800&family=Heebo:wght@400;500;700;800;900&display=swap" rel="stylesheet">

    <!-- Tailwind theme config: map brand colors -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ink:    '#121214', // dark background
                        panel:  '#1c1c22', // raised surface
                        neon:   '#6C5CE7', // primary / neon purple
                        sweet:  '#FF7675', // secondary / sweet pink
                    },
                    fontFamily: {
                        body: ['Assistant', 'sans-serif'],
                        head: ['Heebo', 'sans-serif'],
                    },
                },
            },
        };
    </script>

    <style>
        body { font-family: 'Assistant', sans-serif; }
        h1, h2, h3, .font-head { font-family: 'Heebo', sans-serif; }

        /* Subtle neon glow used on the hero + primary buttons */
        .glow-neon { box-shadow: 0 8px 30px rgba(108, 92, 231, 0.35); }

        /* Hide scrollbar for the horizontal category chips on mobile */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-ink text-gray-100 antialiased selection:bg-neon/40">

    <!-- ===================== STICKY HEADER ===================== -->
    <header class="sticky top-0 z-50 backdrop-blur-md bg-ink/80 border-b border-white/5">
        <!-- Top announcement bar -->
        <div id="announcement-bar"
             class="w-full text-center text-sm font-semibold py-1.5 text-white"
             style="background: linear-gradient(90deg, #6C5CE7, #FF7675);">
            <!-- topAnnouncement injected here -->
        </div>

        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
            <!-- Logo / Store name -->
            <div class="flex items-center gap-2">
                <span class="grid place-items-center w-9 h-9 rounded-xl bg-neon text-white text-lg glow-neon">🍬</span>
                <span id="logo-name" class="font-head font-extrabold text-xl tracking-tight"></span>
            </div>
            <!-- Decorative tagline (desktop only) -->
            <span class="hidden sm:inline text-xs text-gray-400 font-medium">משלוחים מקומיים לשבת</span>
        </div>
    </header>

    <!-- ===================== HERO BANNER ===================== -->
    <section class="relative overflow-hidden">
        <div class="absolute inset-0 -z-10"
             style="background:
                radial-gradient(60% 80% at 80% 0%, rgba(108,92,231,0.30), transparent 60%),
                radial-gradient(50% 70% at 10% 20%, rgba(255,118,117,0.22), transparent 60%);">
        </div>

        <div class="max-w-6xl mx-auto px-4 py-14 sm:py-20 text-center">
            <span class="inline-flex items-center gap-2 px-4 py-1.5 mb-5 rounded-full bg-white/5 border border-white/10 text-sm text-gray-200">
                <span class="w-2 h-2 rounded-full bg-sweet animate-pulse"></span>
                טרי, מתוק ומגיע עד הדלת
            </span>

            <h1 class="font-head font-black text-4xl sm:text-6xl leading-tight mb-5">
                כל המתוקים של <span class="text-neon">שבת</span><br class="hidden sm:block">
                במקום <span class="text-sweet">אחד</span>
            </h1>

            <p class="text-gray-300 text-lg max-w-xl mx-auto mb-8">
                מארזי פינוק, פיצוחים פריכים וממתקי גומי צבעוניים — מסודרים בקטלוג נקי ומוכנים למשלוח מהיר.
            </p>

            <a href="#catalog"
               class="inline-flex items-center gap-2 px-8 py-3.5 rounded-full bg-neon hover:bg-neon/90 text-white font-bold text-lg glow-neon transition-transform hover:scale-105">
                לקטלוג המלא
                <span class="text-base">↓</span>
            </a>
        </div>
    </section>

    <!-- ===================== CATALOG (rendered by JS) ===================== -->
    <main id="catalog" class="max-w-6xl mx-auto px-4 py-12 space-y-16">
        <!-- Categories + product cards injected here -->
    </main>

    <!-- ===================== FOOTER ===================== -->
    <footer class="border-t border-white/5 mt-8">
        <div class="max-w-6xl mx-auto px-4 py-8 text-center text-sm text-gray-400">
            <p id="footer-name" class="font-head font-bold text-gray-200 mb-1"></p>
            <p>© <span id="year"></span> · קטלוג תצוגה · כל הזכויות שמורות</p>
        </div>
    </footer>

    <!-- ===================== DATA + RENDER LOGIC ===================== -->
    <script>
        /* ---------- 1. DATA ARCHITECTURE (our "database" for now) ---------- */
        const storeConfig = {
            storeName: "ממתק לשבת",
            topAnnouncement: "משלוחים מהירים עד כניסת שבת",
            whatsappNumber: "972559345372", // international format, no '+' or spaces (for wa.me)
            categories: ["מארזי הבית", "הפיצוחייה", "עולם הגומי"],
            products: [
                // --- מארזי הבית ---
                {
                    id: 1,
                    category: "מארזי הבית",
                    name: "מארז פינוק קלאסי",
                    description: "מבחר שוקולדים, חטיפים ועוגיות לכל המשפחה.",
                    price: 89,
                    image: "https://images.unsplash.com/photo-1481391319762-47dff72954d9?auto=format&fit=crop&w=600&q=80",
                },
                {
                    id: 2,
                    category: "מארזי הבית",
                    name: "מארז שבת פרימיום",
                    description: "קופסת מתנה יוקרתית עם מתוקים נבחרים.",
                    price: 129,
                    image: "https://images.unsplash.com/photo-1549007994-cb92caebd54b?auto=format&fit=crop&w=600&q=80",
                },
                // --- הפיצוחייה ---
                {
                    id: 3,
                    category: "הפיצוחייה",
                    name: "אגוזי מלך טריים",
                    description: "אגוזים פריכים וטבעיים, קלויים קלות.",
                    price: 45,
                    image: "https://images.unsplash.com/photo-1508061253366-f7da158b6d46?auto=format&fit=crop&w=600&q=80",
                },
                {
                    id: 4,
                    category: "הפיצוחייה",
                    name: "תערובת פיצוחים מלכותית",
                    description: "פיסטוק, קשיו ושקדים במארז אחד.",
                    price: 59,
                    image: "https://images.unsplash.com/photo-1604908176997-125f25cc6f3d?auto=format&fit=crop&w=600&q=80",
                },
                // --- עולם הגומי ---
                {
                    id: 5,
                    category: "עולם הגומי",
                    name: "דובוני גומי קלאסיים",
                    description: "ממתקי גומי צבעוניים בטעמי פירות.",
                    price: 25,
                    image: "https://images.unsplash.com/photo-1582058091505-f87a2e55a40f?auto=format&fit=crop&w=600&q=80",
                },
                {
                    id: 6,
                    category: "עולם הגומי",
                    name: "תולעי גומי חמוצות",
                    description: "פיצוץ של חמיצות ומתיקות בכל ביס.",
                    price: 29,
                    image: "https://images.unsplash.com/photo-1499195333224-3ce974eecb47?auto=format&fit=crop&w=600&q=80",
                },
            ],
        };

        /* ---------- 2. RENDER HELPERS ---------- */

        // Build a pre-filled wa.me link for a given product
        function buildWhatsappLink(product) {
            const message = `היי, אשמח להזמין: ${product.name} - ₪${product.price}`;
            return `https://wa.me/${storeConfig.whatsappNumber}?text=${encodeURIComponent(message)}`;
        }

        // Build a single product card from a product object
        function renderProductCard(product) {
            return `
                <article class="group bg-panel rounded-2xl overflow-hidden border border-white/5 transition-transform duration-300 hover:-translate-y-1 hover:border-neon/40 flex flex-col">
                    <div class="relative aspect-[4/3] overflow-hidden">
                        <img src="${product.image}" alt="${product.name}" loading="lazy"
                             class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                        <!-- Sweet pink price tag -->
                        <span class="absolute top-3 left-3 bg-sweet text-white font-bold text-sm px-3 py-1 rounded-full shadow-lg">
                            ₪${product.price}
                        </span>
                    </div>
                    <div class="p-5 flex flex-col flex-1">
                        <h3 class="font-head font-bold text-lg mb-1">${product.name}</h3>
                        <p class="text-sm text-gray-400 leading-relaxed mb-4">${product.description}</p>

                        <!-- WhatsApp order button (neon-purple, pushed to the bottom of the card) -->
                        <a href="${buildWhatsappLink(product)}" target="_blank" rel="noopener noreferrer"
                           class="mt-auto inline-flex items-center justify-center gap-2 w-full py-2.5 rounded-xl bg-neon hover:bg-neon/90 text-white font-bold text-sm glow-neon transition-transform hover:scale-[1.03] active:scale-95">
                            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                                <path d="M.057 24l1.687-6.163a11.867 11.867 0 01-1.587-5.946C.16 5.335 5.495 0 12.05 0a11.817 11.817 0 018.413 3.488 11.824 11.824 0 013.48 8.414c-.003 6.557-5.338 11.892-11.893 11.892a11.9 11.9 0 01-5.688-1.448L.057 24zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884a9.86 9.86 0 001.51 5.26l-.999 3.648 3.728-.978zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.521.151-.172.2-.296.3-.495.099-.198.05-.372-.025-.521-.075-.148-.669-1.611-.916-2.206-.242-.579-.487-.501-.669-.51l-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.263.489 1.694.626.712.226 1.36.194 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.695.248-1.29.173-1.414z"/>
                            </svg>
                            הזמן בוואטסאפ
                        </a>
                    </div>
                </article>
            `;
        }

        // Build a full category block (heading + grid of its products)
        function renderCategory(categoryName) {
            const items = storeConfig.products.filter(p => p.category === categoryName);
            const cards = items.map(renderProductCard).join("");

            return `
                <section>
                    <div class="flex items-center gap-3 mb-6">
                        <span class="w-1.5 h-7 rounded-full bg-neon"></span>
                        <h2 class="font-head font-extrabold text-2xl sm:text-3xl">${categoryName}</h2>
                        <span class="text-sm text-gray-500">(${items.length} מוצרים)</span>
                    </div>
                    <div class="grid grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6">
                        ${cards}
                    </div>
                </section>
            `;
        }

        /* ---------- 3. RENDER THE UI FROM storeConfig ---------- */
        function renderStore() {
            // Header / announcement / footer text
            document.getElementById("announcement-bar").textContent = storeConfig.topAnnouncement;
            document.getElementById("logo-name").textContent = storeConfig.storeName;
            document.getElementById("footer-name").textContent = storeConfig.storeName;
            document.getElementById("year").textContent = new Date().getFullYear();
            document.title = storeConfig.storeName + " | קטלוג מתוקים ופיצוחים";

            // Catalog: map through categories, each renders its own products
            const catalog = document.getElementById("catalog");
            catalog.innerHTML = storeConfig.categories.map(renderCategory).join("");
        }

        // Kick things off once the DOM is ready
        document.addEventListener("DOMContentLoaded", renderStore);
    </script>
</body>
</html>
