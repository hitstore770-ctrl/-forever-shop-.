<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>iPhone 13 — Buy Now</title>

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Font: Inter (clean, Apple-esque) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
          },
          colors: {
            ink: '#1d1d1f',     // Apple near-black text
            mute: '#6e6e73',    // secondary gray text
            haze: '#f5f5f7',    // soft light background
          },
          boxShadow: {
            soft: '0 12px 40px -12px rgba(0,0,0,0.12)',
            cta: '0 10px 30px -8px rgba(48, 209, 88, 0.45)',
          },
        },
      },
    };
  </script>

  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.015em;
    }
  </style>
</head>

<body class="bg-white text-ink min-h-screen">

  <!-- ============ APP SHELL (mobile-first, centered, capped width) ============ -->
  <div class="mx-auto w-full max-w-md px-6 pb-32">

    <!-- ===================== NAV ===================== -->
    <header class="flex items-center justify-between pt-8 pb-2">
      <span class="text-sm font-semibold tracking-tight">iStore</span>
      <span class="text-xs font-medium text-mute uppercase tracking-[0.2em]">iPhone 13</span>
    </header>

    <!-- ===================== HERO ===================== -->
    <section class="text-center pt-6">
      <p class="text-sm font-medium text-green-600 mb-2">New · In Stock</p>
      <h1 class="text-4xl font-semibold tracking-tight leading-tight">iPhone 13</h1>
      <p class="mt-3 text-base text-mute font-light leading-relaxed">
        Your new superpower. A beautiful display, blazing speed, and a camera that
        captures it all.
      </p>

      <!-- Product image -->
      <div class="mt-8 rounded-[2rem] bg-haze p-6 shadow-soft">
        <img
          src="https://images.unsplash.com/photo-1632661674596-df8be070a5c5?auto=format&fit=crop&w=900&q=80"
          alt="iPhone 13"
          class="mx-auto h-72 w-full object-contain"
        />
      </div>
    </section>

    <!-- ===================== COLOR SELECTOR ===================== -->
    <section class="mt-12">
      <div class="flex items-center justify-between mb-5">
        <h2 class="text-lg font-semibold tracking-tight">Color</h2>
        <span id="colorLabel" class="text-sm text-mute font-medium">Midnight</span>
      </div>

      <div class="flex items-center gap-4">
        <!-- Each swatch is a button; the data-color attribute is for the JS step later -->
        <button
          type="button"
          data-color="Midnight"
          aria-label="Midnight"
          class="h-11 w-11 rounded-full ring-2 ring-offset-2 ring-ink transition"
          style="background-color:#3a3c40;"
        ></button>

        <button
          type="button"
          data-color="Starlight"
          aria-label="Starlight"
          class="h-11 w-11 rounded-full ring-2 ring-offset-2 ring-transparent transition"
          style="background-color:#f0e9dd;"
        ></button>

        <button
          type="button"
          data-color="Blue"
          aria-label="Blue"
          class="h-11 w-11 rounded-full ring-2 ring-offset-2 ring-transparent transition"
          style="background-color:#2e4f64;"
        ></button>

        <button
          type="button"
          data-color="Pink"
          aria-label="Pink"
          class="h-11 w-11 rounded-full ring-2 ring-offset-2 ring-transparent transition"
          style="background-color:#f0d4d2;"
        ></button>

        <button
          type="button"
          data-color="Green"
          aria-label="Green"
          class="h-11 w-11 rounded-full ring-2 ring-offset-2 ring-transparent transition"
          style="background-color:#5a6a55;"
        ></button>

        <button
          type="button"
          data-color="(PRODUCT)RED"
          aria-label="(PRODUCT)RED"
          class="h-11 w-11 rounded-full ring-2 ring-offset-2 ring-transparent transition"
          style="background-color:#bf0013;"
        ></button>
      </div>
    </section>

    <!-- ===================== STORAGE SELECTOR ===================== -->
    <section class="mt-12">
      <h2 class="text-lg font-semibold tracking-tight mb-5">Storage</h2>

      <div class="grid grid-cols-3 gap-3">
        <button
          type="button"
          data-storage="128"
          class="rounded-2xl border-2 border-ink bg-white py-4 px-3 text-center transition active:scale-[0.97]"
        >
          <span class="block text-base font-semibold">128GB</span>
          <span class="block text-xs text-mute mt-0.5 font-medium">Standard</span>
        </button>

        <button
          type="button"
          data-storage="256"
          class="rounded-2xl border-2 border-gray-200 bg-white py-4 px-3 text-center transition active:scale-[0.97]"
        >
          <span class="block text-base font-semibold">256GB</span>
          <span class="block text-xs text-mute mt-0.5 font-medium">More room</span>
        </button>

        <button
          type="button"
          data-storage="512"
          class="rounded-2xl border-2 border-gray-200 bg-white py-4 px-3 text-center transition active:scale-[0.97]"
        >
          <span class="block text-base font-semibold">512GB</span>
          <span class="block text-xs text-mute mt-0.5 font-medium">Pro</span>
        </button>
      </div>
    </section>

    <!-- ===================== PRICE DISPLAY ===================== -->
    <section class="mt-12 flex items-baseline justify-between border-t border-gray-100 pt-8">
      <div>
        <p class="text-sm text-mute font-medium">Total price</p>
        <p class="text-xs text-mute font-light mt-0.5">Free shipping included</p>
      </div>
      <p id="price" class="text-4xl font-bold tracking-tight">₪3,199</p>
    </section>

  </div>

  <!-- ===================== STICKY CTA ===================== -->
  <div class="fixed bottom-0 inset-x-0 z-40 bg-white/90 backdrop-blur-md border-t border-gray-100">
    <div class="mx-auto w-full max-w-md px-6 py-4" style="padding-bottom: calc(1rem + env(safe-area-inset-bottom));">
      <button
        id="whatsappBtn"
        type="button"
        class="w-full h-16 rounded-2xl bg-green-500 text-white text-lg font-semibold flex items-center justify-center gap-3 shadow-cta transition active:scale-[0.98]"
      >
        <!-- WhatsApp glyph -->
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24">
          <path d="M.057 24l1.687-6.163a11.867 11.867 0 0 1-1.587-5.946C.16 5.335 5.495 0 12.05 0a11.82 11.82 0 0 1 8.413 3.488 11.82 11.82 0 0 1 3.48 8.414c-.003 6.557-5.338 11.892-11.893 11.892a11.9 11.9 0 0 1-5.688-1.448L.057 24zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884a9.86 9.86 0 0 0 1.51 5.26l-.999 3.648 3.978-.997zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.521.151-.172.2-.296.3-.495.099-.198.05-.372-.025-.521-.075-.148-.669-1.611-.916-2.206-.242-.579-.487-.501-.669-.51l-.57-.01c-.198 0-.52.074-.792.372s-1.04 1.016-1.04 2.479 1.065 2.876 1.213 3.074c.149.198 2.095 3.2 5.076 4.487.709.306 1.263.489 1.694.626.712.226 1.36.194 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.695.248-1.29.173-1.414z"/>
        </svg>
        Continue Purchase on WhatsApp
      </button>
    </div>
  </div>

  <!-- ===================== SCRIPT (Vanilla JS logic) ===================== -->
  <script>
    /* ----------------------- DATA & STATE ----------------------- */
    const config = {
      whatsapp: "972559345372", // international format, no '+'
      basePrice: 3199,          // 128GB base price in NIS
      storageAddons: {          // additional cost per storage tier (NIS)
        "128": 0,
        "256": 400,
        "512": 800,
      },
    };

    const state = {
      color: "Midnight",
      storage: "128",
    };

    /* ----------------------- HELPERS ----------------------- */
    const fmt = (n) => "₪" + n.toLocaleString("he-IL");

    function currentPrice() {
      return config.basePrice + (config.storageAddons[state.storage] || 0);
    }

    /* ----------------------- ELEMENTS ----------------------- */
    const colorBtns = document.querySelectorAll("[data-color]");
    const storageBtns = document.querySelectorAll("[data-storage]");
    const colorLabel = document.getElementById("colorLabel");
    const priceEl = document.getElementById("price");
    const whatsappBtn = document.getElementById("whatsappBtn");

    /* ----------------------- RENDER ----------------------- */
    function renderPrice() {
      priceEl.textContent = fmt(currentPrice());
    }

    function renderColor() {
      colorLabel.textContent = state.color;
      colorBtns.forEach((btn) => {
        const active = btn.dataset.color === state.color;
        btn.classList.toggle("ring-ink", active);
        btn.classList.toggle("ring-transparent", !active);
      });
    }

    function renderStorage() {
      storageBtns.forEach((btn) => {
        const active = btn.dataset.storage === state.storage;
        btn.classList.toggle("border-ink", active);
        btn.classList.toggle("border-gray-200", !active);
      });
    }

    /* ----------------------- INTERACTIVITY ----------------------- */
    colorBtns.forEach((btn) => {
      btn.addEventListener("click", () => {
        state.color = btn.dataset.color;
        renderColor();
      });
    });

    storageBtns.forEach((btn) => {
      btn.addEventListener("click", () => {
        state.storage = btn.dataset.storage;
        renderStorage();
        renderPrice();
      });
    });

    /* ----------------------- WHATSAPP INTEGRATION ----------------------- */
    whatsappBtn.addEventListener("click", () => {
      const message =
        "היי! הגעתי מהאתר ואשמח לרכוש אייפון 13.\n" +
        "צבע: " + state.color + "\n" +
        "נפח: " + state.storage + "GB\n" +
        "סך הכל מחיר: " + fmt(currentPrice());

      const url =
        "https://wa.me/" + config.whatsapp + "?text=" + encodeURIComponent(message);

      window.open(url, "_blank");
    });

    /* ----------------------- INIT ----------------------- */
    renderColor();
    renderStorage();
    renderPrice();
  </script>

</body>
</html>
